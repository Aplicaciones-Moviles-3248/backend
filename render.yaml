databases:
  - name: courtly-db
    databaseName: courtly
    user: courtly
    plan: free
    region: oregon

services:
  - type: web
    name: courtly-api
    runtime: docker
    plan: free
    region: oregon
    branch: master
    dockerfilePath: Dockerfile
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: courtly-db
      - key: AUTHORIZATION_JWT_SECRET
        generateValue: true
      - key: AUTHORIZATION_JWT_EXPIRATION_DAYS
        value: 7
