databases:
  - name: courtly-db
    databaseName: courtly
    user: courtly
    plan: free
    region: oregon

services:
  - type: web
    name: courtly-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PGHOST
        fromDatabase:
          name: courtly-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: courtly-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: courtly-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: courtly-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: courtly-db
          property: password
      - key: AUTHORIZATION_JWT_SECRET
        generateValue: true
      - key: AUTHORIZATION_JWT_EXPIRATION_DAYS
        value: 7
