databases:
  - name: courtly-db
    databaseName: courtly
    user: courtly_user
    plan: free
    region: ohio

services:
  - type: web
    name: courtly-api
    runtime: docker
    plan: free
    region: ohio
    branch: main
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        value: jdbc:postgresql://dpg-d80260rtqb8s73fp9u2g-a.ohio-postgres.render.com/courtly?sslmode=require
      - key: DB_USERNAME
        fromDatabase:
          name: courtly-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: courtly-db
          property: password
      - key: AUTHORIZATION_JWT_SECRET
        value: courtly-super-secret-jwt-key-2026
      - key: AUTHORIZATION_JWT_EXPIRATION_DAYS
        value: 7