spring.application.name=courtly

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=${PORT:8080}

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

# Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=com.upc.courtly.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT
# A stable default is provided so the app always has a coherent signing/validation key,
# even if AUTHORIZATION_JWT_SECRET is unset or blank. Override it in production.
authorization.jwt.secret=${AUTHORIZATION_JWT_SECRET:courtly-default-jwt-signing-secret-please-override-in-production-0123456789}
authorization.jwt.expiration.days=${AUTHORIZATION_JWT_EXPIRATION_DAYS:7}