spring.application.name=courtly

server.port=${PORT:8080}

# Test datasource: in-memory H2, no external dependency.
# Test resources shadow src/main/resources, so this whole file is the effective
# configuration during the test phase.
spring.datasource.url=jdbc:h2:mem:courtly_test;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Naming Strategy
spring.jpa.hibernate.naming.physical-strategy=com.upc.courtly.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Documentation
documentation.application.description=Courtly API
documentation.application.version=test

# JWT: deterministic secret so signing and validation always agree.
authorization.jwt.secret=ci-test-secret-key-for-jwt-tokens-0123456789
authorization.jwt.expiration.days=7
